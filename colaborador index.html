<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WODSTARS COLABORADOR</title>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  margin:0;
  min-height:100vh;
}

h1,h2,h3{
  color:gold;
  margin:0;
}

button{
  padding:10px 14px;
  background:gold;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

input, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}

.pantalla{
  display:none;
}

.pantalla.activa{
  display:block;
}

.card{
  max-width:420px;
  margin:90px auto;
  background:#111;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(255,215,0,.08);
}

.container{
  max-width:1000px;
  margin:30px auto;
  padding:20px;
}

.panel{
  background:#111;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.row > div{
  flex:1;
  min-width:180px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:#1b1b1b;
  color:gold;
}

th, td{
  border:1px solid #222;
  padding:10px;
  text-align:center;
}

tbody tr:nth-child(even){
  background:#0c0c0c;
}

.score-input{
  width:100%;
  background:#1a1a1a;
  color:white;
  border:none;
  padding:8px;
  border-radius:4px;
  box-sizing:border-box;
}

#error{
  color:#ff6961;
  margin-top:12px;
}

.tipo{
  margin-top:10px;
  color:#bbb;
  font-size:.95rem;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.resultados{
  margin-top:20px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login" class="pantalla activa">
  <div class="card">
    <h1>WODSTARS</h1>
    <br>
    <h3>Acceso colaborador</h3>
    <br>

    <input type="password" id="password" placeholder="ContraseÃ±a">

    <br><br>

    <button onclick="login()">Entrar</button>

    <p id="error"></p>
  </div>
</section>

<!-- APP -->
<section id="app" class="pantalla">
  <div class="container">

    <div class="top">
      <h2>Captura rÃ¡pida de scores</h2>
      <button onclick="cerrarSesion()">Salir</button>
    </div>

    <div class="panel">
      <div class="row">
        <div>
          <label>CategorÃ­a</label>
          <select id="categoria"></select>
        </div>

        <div>
          <label>WOD</label>
          <select id="wod"></select>
        </div>

        <div style="display:flex;align-items:end;">
          <button onclick="cargar()">Cargar</button>
        </div>
      </div>

      <div class="tipo" id="tipo"></div>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Competidor</th>
            <th>Rondas / Reps</th>
            <th>Tiempo</th>
            <th>Tiebreak</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>

    <div class="panel resultados">
      <button onclick="calcular()">Visualizar puntajes</button>

      <table>
        <thead>
          <tr>
            <th>PosiciÃ³n</th>
            <th>Competidor</th>
            <th>Puntos</th>
          </tr>
        </thead>
        <tbody id="resultados"></tbody>
      </table>
    </div>

  </div>
</section>

<script>
const PASSWORD = "E0H0FBD";

const competencias = {
  "Teens Varonil": {
    competidores: [
      "Leonardo Serratos / Comando",
      "Leonardo David / Arkham"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Novatos Varonil": {
    competidores: [
      "Manuel Vazquez / Grizzly",
      "David Martinez / Grizzly",
      "Diego Garcia / Grizzly"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Novatos Femenil": {
    competidores: [
      "Jenifer De La Torre / Primitivo",
      "Isabel Aldama / Grizzly"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Principiante Varonil": {
    competidores: [
      "David Martinez / Primitivo",
      "Armando Ruiz / Comandos",
      "David reyes / Phoenix Centro",
      "Christian Quiroz / Primitivos",
      "German Costumbre / Primitivos",
      "Fernando Aparicio / Grizzly",
      "Jaret Dominguez / Grizzly"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Principiante Femenil": {
    competidores: [
      "Mariel Hernandez / Primitivos",
      "Kimberly Abundes / Primitivos",
      "Veronica Alvarez / Moonlight",
      "Tere / Comando",
      "Fryda / Comando",
      "Nancy Gomez / Grizzly",
      "Nayeli Delreal / Moonlight",
      "Bet Chong / Moonlight",
      "Rosy Juárez / Moonlight",
      "Mariana Olvera / Moonlight"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Intermedio Varonil": {
    competidores: [
      "Alexis Resendiz / Grizzly",
      "Marco Heredia / Moonlight",
      "Jose Luis soñanes / Moonlight",
      "Omar Alvarez / Moonlight",
      "Jorge Kyoshy / Black Horse"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Intermedio Femenil": {
    competidores: [
      "Tatiana Quezada / Grizzly",
      "Yaneli Carbajal / Grizzly",
      "Sonia Zalazar / Grizzly"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  },

  "Avanzado Varonil": {
    competidores: [
      "David Maya / Grizzly",
      "Rafael Campos / FIT60",
      "Irving Salas / Grizzly",
      "Mauricio Avila / Black Horse",
      "Ivan Tellez / Grizzly"
    ],
    wods: {
      "WOD 1": "FOR TIME",
      "WOD 2": "FOR TIME"
    }
  }
};

const timeCaps = {
  "WOD 1": "10:00"
};

const storageKey = "wodstars_scores";

let scores = JSON.parse(localStorage.getItem(storageKey) || "{}");

function login(){
  const pass = document.getElementById("password").value;

  if(pass !== PASSWORD){
    document.getElementById("error").textContent = "ContraseÃ±a incorrecta";
    return;
  }

  document.getElementById("login").classList.remove("activa");
  document.getElementById("app").classList.add("activa");

  iniciar();
}

function cerrarSesion(){
  location.reload();
}

function iniciar(){
  const categoria = document.getElementById("categoria");
  categoria.innerHTML = "";

  Object.keys(competencias).forEach(nombre=>{
    categoria.innerHTML += `<option>${nombre}</option>`;
  });

  actualizarWods();

  categoria.addEventListener("change", ()=>{
    guardarActual();
    actualizarWods();
    cargar();
  });

  document.getElementById("wod").addEventListener("change", ()=>{
    guardarActual();
    cargar();
  });

  cargar();
}

function actualizarWods(){
  const categoria = document.getElementById("categoria").value;
  const wod = document.getElementById("wod");

  wod.innerHTML = "";

  Object.keys(competencias[categoria].wods).forEach(nombre=>{
    wod.innerHTML += `<option>${nombre}</option>`;
  });
}

function claveActual(){
  return document.getElementById("categoria").value + "|" + document.getElementById("wod").value;
}

function guardarActual(){
  const tabla = document.querySelectorAll("#tabla tr");
  if(!tabla.length) return;

  const key = claveActual();

  scores[key] = [];

  tabla.forEach(fila=>{
    scores[key].push({
      nombre: fila.children[0].textContent,
      reps: fila.querySelector(".reps").value,
      tiempo: fila.querySelector(".tiempo").value,
      tiebreak: fila.querySelector(".tiebreak").value,
      libras: fila.querySelector(".libras").value,
      repsNoHechas: fila.querySelector(".repsNoHechas")
        ? fila.querySelector(".repsNoHechas").value
        : ""
    });
  });

  localStorage.setItem(storageKey, JSON.stringify(scores));
}

function cargar(){
  const categoria = document.getElementById("categoria").value;
  const wod = document.getElementById("wod").value;
  const tipo = competencias[categoria].wods[wod];

  document.getElementById("tipo").textContent = "Tipo: " + tipo + (timeCaps[wod] ? " | Time cap: " + timeCaps[wod] : "");

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  const key = claveActual();
  const guardados = scores[key] || [];

  competencias[categoria].competidores.forEach((nombre, index)=>{

    const atleta = guardados[index] || {};

    tabla.innerHTML += `
      <tr>
        <td>${nombre}</td>

        <td>
          <input class="score-input reps" type="number" value="${atleta.reps || ""}">
        </td>

        <td>
          <input class="score-input tiempo" placeholder="00:00" value="${atleta.tiempo || ""}">
        </td>

        <td>
          <input class="score-input tiebreak" placeholder="00:00" value="${atleta.tiebreak || ""}">
        </td>

        <td>
          <input class="score-input libras" type="number" placeholder="lb" value="${atleta.libras || ""}">
        </td>

        ${
          tipo === "FOR TIME"
          ? `<td>
              <input class="score-input repsNoHechas" type="number" placeholder="reps no hechas" value="${atleta.repsNoHechas || ""}">
            </td>`
          : ""
        }
      </tr>
    `;
  });

  const inputs = document.querySelectorAll(".score-input");

  inputs.forEach(input=>{
    input.addEventListener("input", guardarActual);
  });
}

function tiempoASegundos(valor){
  if(!valor) return 999999;

  const p = valor.split(":");
  return Number(p[0]) * 60 + Number(p[1]);
}

function formatoTiempo(seg){
  const m = Math.floor(seg / 60);
  const s = seg % 60;
  return `${m}:${s < 10 ? "0" : ""}${s}`;
}

function calcular(){
  guardarActual();

  const categoria = document.getElementById("categoria").value;
  const wod = document.getElementById("wod").value;
  const tipo = competencias[categoria].wods[wod];

  const filas = document.querySelectorAll("#tabla tr");

  const atletas = [];

  filas.forEach(fila=>{

    const reps = Number(fila.querySelector(".reps").value || 0);
    const tiempo = tiempoASegundos(fila.querySelector(".tiempo").value);
    const tiebreak = tiempoASegundos(fila.querySelector(".tiebreak").value);
    const libras = Number(fila.querySelector(".libras").value || 0);

    let repsNoHechas = 0;

    if(fila.querySelector(".repsNoHechas")){
      repsNoHechas = Number(fila.querySelector(".repsNoHechas").value || 0);
    }

    atletas.push({
      nombre: fila.children[0].textContent,
      reps,
      tiempo,
      tiempoFinal: tiempo + repsNoHechas,
      tiebreak,
      libras,
      repsNoHechas
    });
  });

  if(tipo === "AMRAP"){
    atletas.sort((a,b)=>{
      if(b.reps !== a.reps) return b.reps - a.reps;
      if(b.libras !== a.libras) return b.libras - a.libras;
      return a.tiebreak - b.tiebreak;
    });
  }
if(tipo === "FOR TIME"){
    atletas.sort((a,b)=>{
      if(a.tiempoFinal !== b.tiempoFinal) return a.tiempoFinal - b.tiempoFinal;
      return a.tiebreak - b.tiebreak;
    });
  }

  if(tipo === "RM"){
    atletas.sort((a,b)=>{
      if(b.reps !== a.reps) return b.reps - a.reps;
      if(b.libras !== a.libras) return b.libras - a.libras;
      return a.tiebreak - b.tiebreak;
    });
  }
 

  const resultados = document.getElementById("resultados");
  resultados.innerHTML = "";

  atletas.forEach((a,i)=>{

    const puntos = 100 - (i * 2);

    let detalle = "";

    if(tipo === "AMRAP"){
      detalle = `${a.reps} reps`;
    }

    if(tipo === "FOR TIME"){
      detalle = `${formatoTiempo(a.tiempoFinal)}`;

      if(a.repsNoHechas > 0){
        detalle += ` (${a.repsNoHechas} reps no hechas)`;
      }
    }

    resultados.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${a.nombre}</td>
        <td>${detalle}</td>
        <td>${puntos}</td>
      </tr>
    `;
  });
}
</script>
</body>
</html>
